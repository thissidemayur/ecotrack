global:
  scrape_interval: 15s  
  
scrape_configs:
  - job_name: "prometheus"
    metrics_path: /metrics
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:3000"]